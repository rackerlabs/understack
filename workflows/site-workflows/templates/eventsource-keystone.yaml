{{- if .Values.enabled.keystone }}
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: openstack-keystone
spec:
  amqp:
    notifications:
      url: amqp://rabbitmq-server-0.rabbitmq-nodes.openstack.svc.cluster.local:5672/keystone
      jsonBody: true
      exchangeName: keystone
      exchangeType: topic
      exchangeDeclare:
        durable: true
      routingKey: 'notifications.info'
      queueDeclare:
        name: argo_notifications
        durable: true
        exclusive: false
        autoDelete: false
        noWait: true
      consume:
        consumerTag: "argo-events"
        autoAck: true
        exclusive: false
        noLocal: false
      auth:
        username:
          name: argo-keystone-user-credentials
          key: username
        password:
          name: argo-keystone-user-credentials
          key: password
{{- end }}
