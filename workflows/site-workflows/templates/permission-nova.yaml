{{- if .Values.enabled.nova }}
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: argo-nova
spec:
  vhost: "nova"
  userReference:
    name: "argo-nova"
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: openstack
{{- end }}
