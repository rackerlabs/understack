---
apiVersion: argoproj.io/v1alpha1
metadata:
  name: resync-ironic-nautobot
  annotations:
    workflows.argoproj.io/title: Resync Ironic nodes to Nautobot
    workflows.argoproj.io/description: |
      Resyncs Ironic node data to Nautobot. Use when Nautobot gets out of sync
      with Ironic, e.g., after database restore, missed events, or manual changes.

      To resync all nodes:
      ```
      argo -n argo-events submit --from workflowtemplate/resync-ironic-nautobot
      ```

      To resync a specific node:
      ```
      argo -n argo-events submit --from workflowtemplate/resync-ironic-nautobot \
        -p node="<node-uuid>"
      ```

      Defined in `workflows/argo-events/workflowtemplates/resync-ironic-nautobot.yaml`
kind: WorkflowTemplate
spec:
  entrypoint: main
  serviceAccountName: workflow
  arguments:
    parameters:
      - name: node
        value: ""  # empty = all nodes
  templates:
    - name: main
      container:
        image: ghcr.io/rackerlabs/understack/ironic-nautobot-client:latest
        command:
          - resync-ironic-nautobot
        args:
          - "--node"
          - "{{workflow.parameters.node}}"
        volumeMounts:
          - mountPath: /etc/nb-token/
            name: nb-token
            readOnly: true
          - mountPath: /etc/openstack
            name: baremetal-manage
            readOnly: true
        envFrom:
          - configMapRef:
              name: cluster-metadata
              optional: false
      volumes:
        - name: nb-token
          secret:
            secretName: nautobot-token
        - name: baremetal-manage
          secret:
            secretName: baremetal-manage
            items:
              - key: clouds.yaml
                path: clouds.yaml
