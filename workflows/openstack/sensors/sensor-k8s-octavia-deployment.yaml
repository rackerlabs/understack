---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: octavia-deployment
  namespace: openstack
spec:
  template:
    serviceAccountName: k8s-openstack-events
  # events the Sensor listens for
  dependencies:
    # - eventName: octavia-deployment
    #   eventSourceName: k8s-openstack-octavia
    #   name: openstack-octavia-server-deployment
    - name: octavia-job-success
      eventSourceName: k8s-openstack-octavia
      eventName: octavia-deployment
      # filters:
        # data:
          # - path: body.status.succeeded
          #   type: int
          #   value:
          #     - "1"
          # - path: body.status.conditions.type
          #   type: string
          #   value:
          #     - SuccessCriteriaMet
          # - path: body.status.conditions.status
          #   type: string
          #   value:
          #     - "True"
        # expr: >
        #   body.kind == 'Job' &&
        #   (
        #     (body.status != null && body.status.succeeded == 1) ||
        #     (body.status != null && body.status.conditions != null &&
        #      body.status.conditions.exists(c, c.type == 'Complete' && c.status == 'True')) ||
        #     (body.status != null && body.status.conditions != null &&
        #      body.status.conditions.exists(c, c.type == 'SuccessCriteriaMet' && c.status == 'True'))
        #   )
      # data:
      #   - path: status.succeeded
      #     type: string
      #     value:
      #       - "1"
        # expr: >
        #   body.kind == 'Job' &&
        #   (
        #     (body.status != null && body.status.succeeded == 1) &&
        #     (body.status != null && body.status.conditions != null &&
        #      body.status.conditions.exists(c, c.type == 'Complete' && c.status == 'True'))
        #   )
        # expr: >
        #   body.kind == 'Job' &&
        #   body.status != null &&
        #   body.status.conditions != null &&
        #   body.status.conditions.exists(c, c.type == 'Complete' && c.status == 'True')
  # actions executed when dependencies are satisfied (StandardK8STrigger designed to create or update a generic Kubernetes resource.)
  triggers:
    - template:
        name: octavia-post-deploy
        k8s:
          operation: create
          source:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                generateName: octavia-post-deploy-job-
              spec:
                template:
                  spec:
                    containers:
                      - name: octavia-post-deploy
                        # TODO: switch back to latest tag
                        image: ghcr.io/rackerlabs/understack/ansible:pr-1182
                        imagePullPolicy: Always
                        command: ["ansible-runner", "run", "/runner", "--playbook", "openstack_octavia.yaml"]
                        env:
                          - name: OS_CLOUD
                            value: understack
                        volumeMounts:
                          - name: ansible-inventory
                            mountPath: /runner/inventory/hosts.yaml
                            subPath: hosts.yaml
                          - name: ansible-kubernetes-inventory
                            mountPath: /runner/inventory/inventory.yaml
                            subPath: inventory.yaml
                          - name: ansible-group-vars
                            mountPath: /runner/inventory/group_vars/
                          - name: openstack-svc-acct
                            mountPath: /etc/openstack
                            readOnly: true
                    volumes:
                      - name: runner-data
                        emptyDir: {}
                      - name: ansible-inventory
                        configMap:
                          name: ansible-inventory
                      - name: ansible-kubernetes-inventory
                        configMap:
                          name: ansible-kubernetes-inventory
                      - name: ansible-group-vars
                        configMap:
                          name: ansible-group-vars
                      - name: openstack-svc-acct
                        secret:
                          secretName: openstack-svc-acct
                    restartPolicy: OnFailure
