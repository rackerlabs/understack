{{- if eq (include "understack.isEnabled" (list $.Values.site "undersync")) "true" }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s" $.Release.Name "undersync" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
{{- include "understack.appLabelsBlock" $ | nindent 2 }}
spec:
  destination:
    namespace: undersync
    server: {{ $.Values.cluster_server }}
  project: understack
  sources:
    - ref: understack
      path: 'charts/undersync'
      repoURL: {{ include "understack.understack_url" $ }}
      targetRevision: {{ include "understack.understack_ref" $ }}
      helm:
        releaseName: undersync
        valueFiles:
          - $understack/charts/undersync/values.yaml
          - $deploy/{{ include "understack.deploy_path" $ }}/undersync/values.yaml
        ignoreMissingValueFiles: false
    - ref: deploy
      repoURL: {{ include "understack.deploy_url" $ }}
      targetRevision: {{ include "understack.deploy_ref" $ }}
      path: {{ include "understack.deploy_path" $ }}/undersync
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
{{- end }}
