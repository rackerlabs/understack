{{- $installApp := eq (include "understack.componentOptionAny" (list $ "cert_manager" "installApp" true)) "true" }}
{{- $installConfigs := eq (include "understack.componentOptionAny" (list $ "cert_manager" "installConfigs" false)) "true" }}
{{- if or $installApp $installConfigs }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s" $.Release.Name "cert-manager" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
    # cert-manager is critical for a number of other charts so sync
    # it right after CRDs and before the default 0 wave
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destination:
    namespace: cert-manager
    server: {{ $.Values.cluster_server }}
  project: understack-infra
  sources:
  {{- if $installApp }}
  - chart: cert-manager
    helm:
      releaseName: cert-manager
      valuesObject:
        config:
          apiVersion: controller.config.cert-manager.io/v1alpha1
          enableGatewayAPI: true
          kind: ControllerConfiguration
        crds:
          enabled: true
    repoURL: https://charts.jetstack.io
    targetRevision: v1.20.0
  {{- end }}
  {{- if $installConfigs }}
  - path: {{ include "understack.deploy_path" $ }}/cert-manager
    repoURL: {{ include "understack.deploy_url" $ }}
    targetRevision: {{ include "understack.deploy_ref" $ }}
  {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
{{- end }}
