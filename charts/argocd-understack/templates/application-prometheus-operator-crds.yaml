{{- if or (eq (include "understack.isEnabled" (list $.Values.global "monitoring")) "true") (eq (include "understack.isEnabled" (list $.Values.site "monitoring")) "true") }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s" $.Release.Name "prometheus-operator-crds" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
    # we always want CRDs to be at -2 sync wave
    argocd.argoproj.io/sync-wave: "-2"
spec:
  destination:
    namespace: monitoring
    server: {{ $.Values.cluster_server }}
  project: understack-operators
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-operator-crds
    targetRevision: 24.0.2
    helm:
      releaseName: prometheus-operator-crds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
{{- end }}
