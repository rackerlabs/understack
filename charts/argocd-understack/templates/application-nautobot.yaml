{{- if eq (include "understack.isEnabled" (list $.Values.global "nautobot")) "true" }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s" $.Release.Name "nautobot" }}
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
{{- include "understack.appLabelsBlock" $ | nindent 2 }}
spec:
  destination:
    namespace: nautobot
    server: {{ $.Values.cluster_server }}
  project: understack
  sources:
  - chart: nautobot
    helm:
      fileParameters:
      - name: nautobot.config
        path: {{ $.Values.global.nautobot.nautobot_config }}
      ignoreMissingValueFiles: true
      releaseName: nautobot
      valueFiles:
      - $understack/components/nautobot/values.yaml
      - $deploy/{{ include "understack.deploy_path" $ }}/nautobot/values.yaml
    repoURL: https://nautobot.github.io/helm-charts/
    targetRevision: 2.5.9
  - path: components/nautobot
    ref: understack
    repoURL: {{ include "understack.understack_url" $ }}
    targetRevision: {{ include "understack.understack_ref" $ }}
    kustomize:
      patches:
        - patch: |
            - op: replace
              path: /data/UNDERSTACK_PARTITION
              value: "{{ index $.Values.appLabels "understack.rackspace.com/partition" | default "" }}"
          target:
            kind: ConfigMap
            name: cluster-data
  - path: {{ include "understack.deploy_path" $ }}/nautobot
    ref: deploy
    repoURL: {{ include "understack.deploy_url" $ }}
    targetRevision: {{ include "understack.deploy_ref" $ }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
{{- end }}
