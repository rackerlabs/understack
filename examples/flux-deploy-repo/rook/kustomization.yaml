apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rook-ceph
patches:
  - target:
      kind: HelmRelease
      name: understack-flux-rook
    patch: |
      - op: replace
        path: /spec/chart/spec/version
        value: v1.15.0
  - target:
      kind: HelmRelease
      name: understack-flux-rook
    patch: |
      - op: add
        path: /spec/values
        value:
          rook:
            config:
              CSI_CEPHGRPLIST: "rbd"
          ceph:
            cluster:
              storage:
                useAllNodes: false
                useAllDevices: false
                deviceFilter: "^sd"
              mon:
                count: 3
              dashboard:
                enabled: true
