# Secrets for Nautobot
# In production, use SealedSecrets or ExternalSecrets
# This is a placeholder showing the required secrets

---
apiVersion: v1
kind: Secret
metadata:
  name: nautobot-superuser
  namespace: nautobot
type: Opaque
stringData:
  # Override with actual values in your environment
  username: admin
  password: CHANGEME
  email: admin@example.com

---
apiVersion: v1
kind: Secret
metadata:
  name: nautobot-secret
  namespace: nautobot
type: Opaque
stringData:
  # Nautobot secret key - generate with: python -c "import secrets; print(secrets.token_hex(50))"
  NAUTOBOT_SECRET_KEY: CHANGEME
  NAUTOBOT_DB_PASSWORD: CHANGEME
  NAUTOBOT_REDIS_PASSWORD: CHANGEME

