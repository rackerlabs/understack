---
component: site-workflows
componentNamespace: openstack
sources:
  - ref: understack
    path: 'charts/site-workflows'
    helm:
      valueFiles:
        - $understack/charts/site-workflows/values.yaml
        - $deploy/{{.name}}/site-workflows/values.yaml
      ignoreMissingValueFiles: true
  - ref: deploy
    path: '{{.name}}/site-workflows'
