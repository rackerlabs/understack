- name: Build octavia_port_names (override or hostname)
  ansible.builtin.set_fact:
    octavia_port_names: "{{ octavia_port_names | default([]) + [ (hostvars[item].octavia_port_name_override | default(item)) ] }}"
  loop: "{{ groups['all'] }}"
  when:
    - hostvars[item].ovs_enabled is defined
    - hostvars[item].ovs_enabled | bool
  run_once: true
  delegate_to: localhost
  loop_control:
    label: "{{ item }}"

- name: Create ports debug
  ansible.builtin.debug:
    msg: "item {{ item }}"
  with_items: "{{ octavia_port_names }}"
  run_once: true

