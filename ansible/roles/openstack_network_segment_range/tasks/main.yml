---

- name: Check if segment range exists
  ansible.builtin.shell: openstack network segment range show {{ item.name }}
  loop: "{{ network_segment_ranges }}"
  loop_control:
    label: "{{ item.name }}"
  register: segment_range_check
  failed_when: false
  changed_when: false

- name: Create network segment range if missing
  ansible.builtin.shell: |
    openstack network segment range create \
      --shared \
      --network-type {{ item.item['network-type'] }} \
      --minimum {{ item.item.range_min }} \
      --maximum {{ item.item.range_max }} \
      {% if item.item.get('physical-network', '') | length > 0 %}
      --physical-network {{ item.item['physical-network'] }} \
      {% endif %}
      {{ item.item.name }}
  loop: "{{ segment_range_check.results | selectattr('rc', 'ne', 0) | list }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: segment_range_create
  changed_when: true
