---

- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ image_download_dir }}"
    state: directory
    mode: '0755'

- name: Look up existing Glance images by ID
  openstack.cloud.image_info:
    cloud: "{{ openstack_cloud | default(omit) }}"
    filters:
      id: "{{ item.uuid }}"
  register: existing_image_info
  loop: "{{ understack_images }}"
  loop_control:
    label: "{{ item.name }}"
  when: understack_images | length > 0

- name: Reserve missing Glance image IDs before upload
  openstack.cloud.image:
    cloud: "{{ openstack_cloud | default(omit) }}"
    name: "{{ item.item.name }}"
    id: "{{ item.item.uuid }}"
    disk_format: "{{ item.item.disk_format }}"
    container_format: "{{ item.item.container_format | default('bare') }}"
    is_public: "{{ item.item.is_public | default(true) }}"
    is_protected: "{{ item.item.is_protected | default(false) }}"
    min_disk: "{{ item.item.min_disk | default(0) }}"
    min_ram: "{{ item.item.min_ram | default(0) }}"
    properties: "{{ item.item.properties | default({}) }}"
    tags: "{{ item.item.tags | default([]) }}"
    state: present
    wait: false
  register: reserve_result
  failed_when:
    - reserve_result is failed
    - "'already exists' not in (reserve_result.msg | default(''))"
    - "'DuplicateResource' not in (reserve_result.msg | default(''))"
    - "'More than one Image' not in (reserve_result.msg | default(''))"
  loop: "{{ existing_image_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - understack_images | length > 0
    - item.images | length == 0

- name: Build list of images that need data upload (newly reserved or incomplete)
  ansible.builtin.set_fact:
    _reserved_image_uuids: >-
      {{
        (reserve_result.results
         | default([])
         | selectattr('changed', 'defined')
         | selectattr('changed')
         | map(attribute='item')
         | map(attribute='item')
         | map(attribute='uuid')
         | list)
        +
        (existing_image_info.results
         | default([])
         | selectattr('images', 'defined')
         | selectattr('images')
         | map(attribute='images')
         | map('first')
         | selectattr('status', 'in', ['queued', 'uploading'])
         | map(attribute='id')
         | list)
      }}

- name: Download images that still need data upload
  ansible.builtin.get_url:
    url: "{{ item.external_url }}"
    dest: "{{ image_download_dir }}/{{ item.uuid }}.{{ item.disk_format }}"
    checksum: "{{ item.checksum | default(omit) }}"
    mode: '0644'
  loop: "{{ understack_images }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - understack_images | length > 0
    - item.uuid in _reserved_image_uuids

- name: Look up target Glance images after reservation
  openstack.cloud.image_info:
    cloud: "{{ openstack_cloud | default(omit) }}"
    filters:
      id: "{{ item.uuid }}"
  register: target_image_info
  loop: "{{ understack_images }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - understack_images | length > 0
    - item.uuid in _reserved_image_uuids

- name: Upload image data to queued or uploading Glance images
  openstack.cloud.image:
    cloud: "{{ openstack_cloud | default(omit) }}"
    name: "{{ item.images[0].name }}"
    id: "{{ item.item.uuid }}"
    filename: "{{ image_download_dir }}/{{ item.item.uuid }}.{{ item.item.disk_format }}"
    disk_format: "{{ item.images[0].disk_format }}"
    container_format: "{{ item.images[0].container_format }}"
    state: present
    wait: true
  loop: "{{ target_image_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - understack_images | length > 0
    - item is not skipped
    - item.images | length > 0
    - item.images[0].status in ['queued', 'uploading']

- name: Look up target Glance images after uploading data
  openstack.cloud.image_info:
    cloud: "{{ openstack_cloud | default(omit) }}"
    filters:
      id: "{{ item.uuid }}"
  register: target_image_info_2
  loop: "{{ understack_images }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - understack_images | length > 0
    - item.uuid in _reserved_image_uuids

- name: Tell Glance to import the image data (using use_import and glance-direct)
  openstack.cloud.image:
    cloud: "{{ openstack_cloud | default(omit) }}"
    id: "{{ item.item.uuid }}"
    name: "{{ item.images[0].name }}"
    use_import: true
    state: present
    wait: true
  loop: "{{ target_image_info_2.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - understack_images | length > 0
    - item is not skipped
    - item.images | length > 0
    - item.images[0].status == 'uploading'

- name: Wait for Glance images to become active
  openstack.cloud.image_info:
    cloud: "{{ openstack_cloud | default(omit) }}"
    filters:
      id: "{{ item.uuid }}"
  register: final_image_info
  loop: "{{ understack_images }}"
  loop_control:
    label: "{{ item.name }}"
  until:
    - final_image_info.images | length > 0
    - final_image_info.images[0].status == 'active'
  retries: 60
  delay: 10
  when:
    - understack_images | length > 0
    - item.uuid in _reserved_image_uuids

- name: Verify all Glance images are active
  ansible.builtin.assert:
    that:
      - item.images | length > 0
      - item.images[0].status == 'active'
    fail_msg: >-
      Glance image {{ item.item.name }} ({{ item.item.uuid }}) did not become active.
      Current status: {{ item.images[0].status if (item.images | length > 0) else 'missing' }}
    success_msg: >-
      Glance image {{ item.item.name }} ({{ item.item.uuid }}) is active.
  loop: "{{ final_image_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - understack_images | length > 0
    - item is not skipped

