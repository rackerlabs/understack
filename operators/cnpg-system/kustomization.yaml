---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rule-backups-too-old.yaml
  - rule-wal-archive-backlog-warning.yaml
  - rule-wal-archive-backlog-critical.yaml
  - rule-wal-archive-failure.yaml

helmGlobals:
  chartHome: ../../charts/

helmCharts:
- name: cloudnative-pg
  includeCRDs: true
  namespace: cnpg-system
  valuesFile: values.yaml
  releaseName: cloudnative-pg
  version: 0.27.1
  repo: https://cloudnative-pg.github.io/charts
