apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    undercloud.local/purpose: dnsmasq-etc
  name: dnsmasq-ironic
  namespace: openstack
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: ceph-fs-ec
  resources:
    requests:
      storage: 16Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    undercloud.local/purpose: dnsmasq-dhcp
  name: dnsmasq-dhcp
  namespace: openstack
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: ceph-fs-ec
  resources:
    requests:
      storage: 16Mi
