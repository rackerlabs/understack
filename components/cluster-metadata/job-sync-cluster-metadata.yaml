---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-cluster-metadata-to-prometheus
  namespace: openstack
  labels:
    app.kubernetes.io/name: cluster-metadata
    app.kubernetes.io/component: prometheus-sync
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: sync-metadata
          image: python:3-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /scripts/sync-cluster-metadata.py
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          env:
            - name: PUSHGATEWAY_URL
              value: http://prometheus-pushgateway.monitoring.svc.cluster.local:9091
            - name: METRIC_JOB_NAME
              value: cluster_metadata
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: cluster-metadata
              mountPath: /etc/cluster-metadata
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: cluster-metadata-sync-script
        - name: cluster-metadata
          configMap:
            name: cluster-metadata
